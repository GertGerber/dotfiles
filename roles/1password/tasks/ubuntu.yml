########################################
# Filename:  roles/1password/tasks/ubuntu.yml
########################################
---
- name: Download 1Password apt repository key
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /usr/share/keyrings/1password-archive-keyring.asc
    mode: '0644'
  become: yes

- name: Add 1Password apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/1password-archive-keyring.asc] https://downloads.1password.com/linux/debian/amd64 stable main"
    state: present
  become: yes

- name: Install 1Password CLI
  ansible.builtin.package:
    name: 1password-cli
    state: latest
  become: yes

- name: Ensure 1Password CLI is in PATH for Bash
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: 'export PATH="$PATH:/usr/local/bin"'
    state: present
    insertafter: EOF
  notify: reload shell

- name: Ensure 1Password CLI is in PATH for Zsh
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: 'export PATH="$PATH:/usr/local/bin"'
    state: present
    insertafter: EOF
  notify: reload shell

- name: Ensure Fish config file exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/fish/config.fish"
    state: touch
    mode: '0644'

- name: Ensure 1Password CLI is in PATH for Fish
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.config/fish/config.fish"
    line: 'set -gx PATH /usr/local/bin $PATH'
    state: present
    insertafter: EOF
  notify: reload shell

- name: Optionally sign in to 1Password CLI (interactive)
  ansible.builtin.debug:
    msg: "Run 'eval $(op signin)' manually on this machine"

- name: List items in Personal vault
  ansible.builtin.command: op item list --vault "Personal"
  register: personal_items
  changed_when: false
  failed_when: false   # prevents errors if not signed in yet

- name: Show Personal vault items (as list)
  ansible.builtin.debug:
    msg: "{{ personal_items.stdout_lines | default([]) }}"

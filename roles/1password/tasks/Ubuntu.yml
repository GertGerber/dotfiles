---
# Installs 1Password CLI on Ubuntu 24.04 and prepares 'op' usage for other roles
# - Modern signed-by repo (arch-specific URL)
# - debsig policy for package verification
# - Exposes facts about 1Password auth mode for downstream roles (e.g., ssh)

- name: Ensure keyring & debsig directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /usr/share/keyrings
    - /etc/apt/keyrings
    - /usr/share/debsig/keyrings/AC2D62742012EA22
    - /etc/debsig/policies/AC2D62742012EA22
  become: true

- name: Download 1Password signing key (ASCII armor)
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /tmp/1password.asc
    mode: "0644"
  become: true

- name: Dearmor key for APT keyring
  ansible.builtin.command: >
    gpg --dearmor -o /usr/share/keyrings/1password-archive-keyring.gpg /tmp/1password.asc
  args:
    creates: /usr/share/keyrings/1password-archive-keyring.gpg
  become: true

- name: Dearmor key for debsig keyring
  ansible.builtin.command: >
    gpg --dearmor -o /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg /tmp/1password.asc
  args:
    creates: /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
  become: true

- name: Install debsig policy for 1Password
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/debian/debsig/1password.pol
    dest: /etc/debsig/policies/AC2D62742012EA22/1password.pol
    mode: "0644"
  become: true

- name: Compute apt arch (amd64/arm64)
  ansible.builtin.set_fact:
    apt_arch: >-
      {{ 'amd64' if ansible_architecture in ['x86_64'] else
         'arm64' if ansible_architecture in ['aarch64','arm64'] else ansible_architecture }}

# IMPORTANT: repo URL must include /{{ apt_arch }} (amd64 or arm64)
- name: Add 1Password APT repository (signed-by, arch-specific URL)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ apt_arch }} signed-by=/usr/share/keyrings/1password-archive-keyring.gpg]
      https://downloads.1password.com/linux/debian/{{ apt_arch }} stable main
    filename: 1password
    mode: "0644"
    state: present
  become: true

- name: Install 1Password CLI
  ansible.builtin.apt:
    name: 1password-cli
    update_cache: true
    state: present
  become: true

# --- Prepare 'op' usage for downstream roles (no interactive signin here) ---

- name: Check 1Password CLI availability
  ansible.builtin.command: op --version
  register: op_check
  changed_when: false
  failed_when: false

- name: Fail if 'op' is not available after install
  ansible.builtin.fail:
    msg: "1Password CLI (op) is not available on PATH after install."
  when: op_check.rc != 0

# Determine auth mode: service account token vs user session
- name: Determine 1Password auth mode
  ansible.builtin.set_fact:
    op_account_domain: "{{ op_account_domain | default('my.1password.com') }}"
    op_service_account_token_effective: >-
      {{ lookup('env','OP_SERVICE_ACCOUNT_TOKEN') | default(op_service_account_token | default('', true), true) }}
    op_auth_mode: >-
      {{ 'service' if (lookup('env','OP_SERVICE_ACCOUNT_TOKEN') | length > 0)
         or (op_service_account_token | default('', true) | length > 0)
         else 'session' }}

- name: Note 1Password auth mode
  ansible.builtin.debug:
    msg:
      - "1Password auth mode: {{ op_auth_mode }}"
      - >-
        {{ 'Using OP_SERVICE_ACCOUNT_TOKEN from env/vars.' if op_auth_mode == 'service'
           else 'Using user session. If a downstream task fails, run:  eval \"$(op signin ' ~ op_account_domain ~ ')\"  and re-run.' }}

---
# Installs 1Password CLI via signed repo + debsig verification (Ubuntu 24.04)

- name: Ensure keyring & debsig directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /usr/share/keyrings
    - /etc/apt/keyrings
    - /usr/share/debsig/keyrings/AC2D62742012EA22
    - /etc/debsig/policies/AC2D62742012EA22
  become: true

- name: Download 1Password signing key (ASCII armor)
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /tmp/1password.asc
    mode: "0644"
  become: true

- name: Dearmor key for APT keyring
  ansible.builtin.command: >
    gpg --dearmor -o /usr/share/keyrings/1password-archive-keyring.gpg /tmp/1password.asc
  args:
    creates: /usr/share/keyrings/1password-archive-keyring.gpg
  become: true

- name: Dearmor key for debsig keyring
  ansible.builtin.command: >
    gpg --dearmor -o /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg /tmp/1password.asc
  args:
    creates: /usr/share/debsig/keyrings/AC2D62742012EA22/debsig.gpg
  become: true

- name: Install debsig policy for 1Password
  ansible.builtin.copy:
    dest: /etc/debsig/policies/AC2D62742012EA22/1password.pol
    mode: "0644"
    content: |
      <?xml version="1.0"?>
      <!DOCTYPE Policy SYSTEM "https://www.debian.org/debsig/1.0/policy.dtd">
      <Policy xmlns="https://www.debian.org/debsig/1.0/">
        <Origin Name="1Password" id="AC2D62742012EA22" Description="1Password DEB packages"/>
        <Selection>
          <Required Type="origin" File="debsig.gpg" id="AC2D62742012EA22"/>
        </Selection>
        <Verification MinOptional="0">
          <Required Type="origin" File="debsig.gpg" id="AC2D62742012EA22"/>
        </Verification>
      </Policy>
  become: true

- name: Compute apt arch (amd64/arm64)
  ansible.builtin.set_fact:
    apt_arch: >-
      {{ 'amd64' if ansible_architecture in ['x86_64'] else
         'arm64' if ansible_architecture in ['aarch64','arm64'] else ansible_architecture }}

- name: Add 1Password APT repository (signed-by)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ apt_arch }} signed-by=/usr/share/keyrings/1password-archive-keyring.gpg]
      https://downloads.1password.com/linux/debian/ stable main
    filename: 1password
    mode: "0644"
    state: present
  become: true

- name: Install 1Password CLI
  ansible.builtin.apt:
    name: 1password-cli
    update_cache: true
    state: present
  become: true

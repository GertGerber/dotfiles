---
- name: Nomad | Ensure keyrings dir exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Nomad | Add the HashiCorp GPG key
  ansible.builtin.get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /tmp/hashicorp.gpg
    mode: "0644"
  become: true

- name: Nomad | Dearmor HashiCorp key
  ansible.builtin.command: >
    gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg /tmp/hashicorp.gpg
  args:
    creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg
  become: true

- name: Nomad | Add the official HashiCorp Linux repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg]
      https://apt.releases.hashicorp.com {{ ansible_lsb.codename }} main
    filename: hashicorp
    mode: "0644"
    state: present
  become: true

- name: Nomad | Install Nomad
  ansible.builtin.apt:
    name: nomad
    state: present
    update_cache: true
  become: true

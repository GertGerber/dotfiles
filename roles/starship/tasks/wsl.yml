---
- name: Ensure starship is installed on WSL
  become: true
  ansible.builtin.apt:
    name: starship
    state: present
    update_cache: yes

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: '0755'

- name: Deploy custom starship config
  ansible.builtin.template:
    src: starship.toml.j2
    dest: "{{ ansible_env.HOME }}/.config/starship.toml"
    mode: '0644'

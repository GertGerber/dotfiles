---
- name: Gather Ubuntu version
  ansible.builtin.setup:
    filter: ansible_distribution_version
  register: ubuntu_version

- name: Ensure curl is installed
  apt:
    name: curl
    state: present
    update_cache: yes

- name: Install Starship via apt if Ubuntu >= 25.04
  apt:
    name: starship
    state: present
  when: ubuntu_version.ansible_facts.ansible_distribution_version is version('25.04', '>=')

- name: Install Starship via official script for older Ubuntu
  shell: curl -sS https://starship.rs/install.sh | sh
  args:
    creates: /usr/local/bin/starship
  when: ubuntu_version.ansible_facts.ansible_distribution_version is version('25.04', '<')

- name: Ensure Starship config directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config/starship"
    state: directory
    mode: '0755'

- name: Deploy Starship configuration
  template:
    src: starship.toml.j2
    dest: "{{ ansible_env.HOME }}/.config/starship.toml"
    owner: "{{ ansible_env.USER }}"
    group: "{{ ansible_env.USER }}"
    mode: '0644'

- name: Ensure ~/.zshrc exists
  file:
    path: "{{ ansible_env.HOME }}/.zshrc"
    state: touch
    owner: "{{ ansible_user_id }}"
    group: "{{ ansible_user_gid }}"
    mode: '0644'

- name: Ensure Starship is initialized in zsh
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: 'eval "$(starship init zsh)"'
    state: present

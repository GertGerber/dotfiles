# Install Starship using the official install script
- name: Install Starship
  shell: curl -fsSL https://starship.rs/install.sh | sh -s -- -y
  args:
    creates: /usr/local/bin/starship

# Ensure the user's config directory exists
- name: Ensure Starship config directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: '0755'

- name: Ensure Starship config directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config/starship"
    state: directory
    mode: '0755'

# Deploy the starship.toml configuration
- name: Deploy Starship configuration
  template:
    src: starship.toml.j2
    dest: "{{ ansible_env.HOME }}/.config/starship.toml"
    owner: "{{ ansible_env.USER }}"
    group: "{{ ansible_env.USER }}"
    mode: '0644'

# Add Starship init to .zshrc if not already present
- name: Ensure Starship is initialized in zsh
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: 'eval "$(starship init zsh)"'
    state: present
- name: List items in 1Password vault
  ansible.builtin.command: >
    op item list --vault {{ onepassword_vault }}
  register: vault_items
  changed_when: false
  environment:
    OP_SERVICE_ACCOUNT_TOKEN: "{{ onepassword_service_account_token }}"

- name: Parse vault items
  ansible.builtin.set_fact:
    vault_items_parsed: "{{ vault_items.stdout | from_json }}"

- name: Fetch SSH private and public keys from vault (ED25519)
  ansible.builtin.loop: "{{ vault_items_parsed }}"
  loop_control:
    loop_var: vault_item
  ansible.builtin.block:
    - name: Fetch item details
      ansible.builtin.command: >
        op item get "{{ vault_item.id }}" --format json
      register: item_details
      changed_when: false
      environment:
        OP_SERVICE_ACCOUNT_TOKEN: "{{ onepassword_service_account_token }}"

    - name: Extract private key and write to local .ssh/id_ed25519
      ansible.builtin.copy:
        content: "{{ item_details.stdout | from_json | json_query('details.sections[?title==`SSH Keys`].fields[?name==`Private Key`].value') | first }}"
        dest: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
        mode: 0600

    - name: Extract public key and write to local .ssh/id_ed25519.pub
      ansible.builtin.copy:
        content: "{{ item_details.stdout | from_json | json_query('details.sections[?title==`SSH Keys`].fields[?name==`Public Key`].value') | first }}"
        dest: "{{ ansible_env.HOME }}/.ssh/id_ed25519.pub"
        mode: 0644



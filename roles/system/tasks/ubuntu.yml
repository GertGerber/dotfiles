---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages to latest
  ansible.builtin.apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes

- name: Install essential packages
  ansible.builtin.apt:
    name: "{{ system_packages }}"
    state: present

- name: Ensure user has .local/bin in PATH
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    regexp: 'export PATH=.*\.local/bin'
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present

- name: Ensure user has .local/bin in PATH for zsh
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    regexp: 'export PATH=.*\.local/bin'
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present

- name: Display Ubuntu note
  ansible.builtin.debug:
    msg: "Ubuntu upgrade completed. No reboot required."
---
# Docker Engine on Ubuntu 24.04 (Noble) with signed-by keyring

- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download Docker GPG key (ASCII)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.gpg.asc
    mode: "0644"
  become: true

- name: Dearmor Docker GPG key
  ansible.builtin.command: >
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg.asc
  args:
    creates: /etc/apt/keyrings/docker.gpg
  become: true

- name: Compute apt arch (amd64/arm64)
  ansible.builtin.set_fact:
    apt_arch: >-
      {{ 'amd64' if ansible_architecture in ['x86_64'] else
         'arm64' if ansible_architecture in ['aarch64','arm64'] else ansible_architecture }}

- name: Add Docker APT repository (signed-by)
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ apt_arch }} signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable
    filename: docker
    mode: "0644"
    state: present
  become: true

- name: Install Docker Engine packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present
  become: true

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  become: true

- name: Add current user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true
  become: true

- name: Enable & start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

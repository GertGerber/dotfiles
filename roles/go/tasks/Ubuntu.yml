---
# Ensure Go is on PATH for Ansible runtime and install packages idempotently

# Assumes Go was extracted to /usr/local/go in a prior task
- name: Go-Lang | Symlink go into /usr/local/bin
  ansible.builtin.file:
    src: /usr/local/go/bin/go
    dest: /usr/local/bin/go
    state: link
  become: true

- name: Go-Lang | Ensure /etc/profile.d/go.sh sets PATH
  ansible.builtin.copy:
    dest: /etc/profile.d/go.sh
    mode: "0644"
    content: |
      export PATH=/usr/local/go/bin:$PATH
  become: true

- name: Go-Lang | Install Go packages
  ansible.builtin.shell: "/usr/local/go/bin/go install {{ item.package }}"
  args:
    executable: /bin/bash
    creates: "/usr/local/bin/{{ item.cmd }}"
  environment:
    PATH: "/usr/local/go/bin:{{ ansible_env.PATH }}"
    GOPATH: "{{ ansible_env.HOME }}/go"
    GOBIN: "/usr/local/bin"
    GO111MODULE: "on"
  loop:
    - { cmd: "task", package: "github.com/go-task/task/v3/cmd/task@latest" }
    - { cmd: "sesh", package: "github.com/joshmedeski/sesh/v2@latest" }
  become: true

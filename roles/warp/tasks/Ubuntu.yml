---
- name: "Warp | Ensure keyrings dir exists"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: "Warp | Download Warp key"
  ansible.builtin.get_url:
    url: https://releases.warp.dev/linux/keys/warp.asc
    dest: /tmp/warp.asc
    mode: "0644"
  become: true

- name: "Warp | Dearmor key"
  ansible.builtin.command: >
    gpg --dearmor -o /etc/apt/keyrings/warpdotdev.gpg /tmp/warp.asc
  args:
    creates: /etc/apt/keyrings/warpdotdev.gpg
  become: true

- name: "Warp | Add APT Repository"
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/warpdotdev.gpg] https://releases.warp.dev/linux/deb stable main"
    filename: warpdotdev
    state: present
    mode: "0644"
  become: true

- name: "Warp | Install Warp"
  ansible.builtin.apt:
    name: warp-terminal
    state: present
    update_cache: true
  become: true

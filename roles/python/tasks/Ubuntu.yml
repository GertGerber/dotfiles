---
# Ensure Python packages install cleanly on Ubuntu 24.04 (Noble)
# Enables Universe and installs headers with fallbacks for 24.04 packaging.

- name: "Python | Enable Universe component (base)"
  ansible.builtin.apt_repository:
    repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_lsb.codename }} universe"
    filename: "ubuntu-universe"
    state: present
  become: true

- name: "Python | Enable Universe component (updates)"
  ansible.builtin.apt_repository:
    repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_lsb.codename }}-updates universe"
    filename: "ubuntu-universe-updates"
    state: present
  become: true

- name: "Python | Enable Universe component (security)"
  ansible.builtin.apt_repository:
    repo: "deb http://security.ubuntu.com/ubuntu {{ ansible_lsb.codename }}-security universe"
    filename: "ubuntu-universe-security"
    state: present
  become: true

# Base tools (no headers yet)
- name: "Python | Install core Python tooling"
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - build-essential
    state: present
    update_cache: true
  become: true

# Headers vary on Noble: try meta, then versioned, then all-dev
- name: "Python | Determine versioned dev package"
  ansible.builtin.set_fact:
    py_dev_versioned: "python3.{{ ansible_python_version.split('.')[1] }}-dev"  # e.g., python3.12-dev

- name: "Python | Install development headers (with fallbacks)"
  block:
    - name: "Python | Install python3-dev (meta)"
      ansible.builtin.apt:
        name: python3-dev
        state: present
        update_cache: true
      become: true
  rescue:
    - block:
        - name: "Python | Install versioned headers"
          ansible.builtin.apt:
            name: "{{ py_dev_versioned }}"
            state: present
            update_cache: true
          become: true
      rescue:
        - name: "Python | Install python3-all-dev (last resort)"
          ansible.builtin.apt:
            name: python3-all-dev
            state: present
            update_cache: true
          become: true

# Optional: provide `python` shim to python3
- name: "Python | Ensure 'python' points to python3"
  ansible.builtin.apt:
    name: python-is-python3
    state: present
  become: true

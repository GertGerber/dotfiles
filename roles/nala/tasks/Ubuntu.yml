---
- name: "Nala | Detecting Installed Nala"
  ansible.builtin.command:
    cmd: which nala
  changed_when: false
  register: nala_cmd
  failed_when: false

- name: "Nala | Register nala status installed"
  ansible.builtin.set_fact:
    nala_is_installed: true
  when: nala_cmd.stdout|length > 0

- name: "Nala | Register nala status not installed"
  ansible.builtin.set_fact:
    nala_is_installed: false
  when: nala_cmd.stdout|length == 0

# Ubuntu 24+ : Nala is in the Ubuntu repos
- name: "Nala | Install Nala (Ubuntu 24+)"
  ansible.builtin.apt:
    name: nala
    state: present
    update_cache: true
  become: true
  when:
    - not nala_is_installed
    - ansible_distribution_major_version|int >= 24

# Older Ubuntu: add Volian repository with signed-by keyring
- name: "Nala | Setup Volian repository for older Ubuntu"
  block:
    - name: "Nala | Ensure keyring dir exists"
      ansible.builtin.file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"

    - name: "Nala | Download Volian scar key"
      ansible.builtin.get_url:
        url: "https://deb.volian.org/volian/scar.key"
        dest: /tmp/volian-scar.key
        mode: "0644"

    - name: "Nala | Dearmor Volian key"
      ansible.builtin.command: >
        gpg --dearmor -o /usr/share/keyrings/volian-archive-scar-unstable.gpg /tmp/volian-scar.key
      args:
        creates: /usr/share/keyrings/volian-archive-scar-unstable.gpg

    - name: "Nala | Add Volian repo (scar)"
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/volian-archive-scar-unstable.gpg] https://deb.volian.org/volian/ scar main"
        filename: "volian-scar"
        mode: "0644"
        state: present

    - name: "Nala | Install Nala (Ubuntu 22)"
      ansible.builtin.apt:
        name: nala
        state: present
        update_cache: true
      when:
        - ansible_distribution_major_version == "22"

    - name: "Nala | Install Nala-legacy (Ubuntu 20)"
      ansible.builtin.apt:
        name: nala-legacy
        state: present
        update_cache: true
      when:
        - ansible_distribution_major_version == "20"
  become: true
  when:
    - not nala_is_installed
    - ansible_distribution_major_version|int < 24

---
# Cross-platform sudo & package-manager detection

- name: Initialise sudo detection variables
  ansible.builtin.set_fact:
    has_sudo: false
    sudo_method: "none"
    sudo_requires_password: true
    can_install_packages: false
    detected_package_manager: "unknown"

- name: Detect if running as root
  ansible.builtin.set_fact:
    has_sudo: true
    sudo_method: "root"
    sudo_requires_password: false
    can_install_packages: true
  when: ansible_user_id == "root"

- name: Probe sudo -n (no prompt)
  ansible.builtin.command: sudo -n true
  register: sudo_probe
  changed_when: false
  failed_when: false
  when: ansible_user_id != "root"

- name: Register sudo availability from probe
  ansible.builtin.set_fact:
    has_sudo: "{{ sudo_probe.rc == 0 }}"
    sudo_method: "{{ 'sudo' if sudo_probe.rc == 0 else 'none' }}"
    sudo_requires_password: "{{ sudo_probe.rc != 0 and ansible_user_id != 'root' }}"
  when: ansible_user_id != "root"

- name: Detect package manager (apt/dnf/zypper/pacman/brew)
  ansible.builtin.shell: |
    if command -v apt-get >/dev/null 2>&1; then echo apt;
    elif command -v dnf >/dev/null 2>&1; then echo dnf;
    elif command -v zypper >/dev/null 2>&1; then echo zypper;
    elif command -v pacman >/dev/null 2>&1; then echo pacman;
    elif command -v brew >/dev/null 2>&1; then echo brew;
    else echo unknown; fi
  args:
    executable: /bin/bash
  changed_when: false
  register: pkgmgr_detect

- name: Set detected package manager fact
  ansible.builtin.set_fact:
    detected_package_manager: "{{ pkgmgr_detect.stdout | trim }}"
    can_install_packages: "{{ (has_sudo | bool) or (ansible_user_id == 'root') }}"

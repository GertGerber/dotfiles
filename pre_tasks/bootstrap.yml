---
- name: Bootstrap base system with OS/WSL/macOS detection
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    is_wsl: false
    is_mac: false
    os_type: "{{ ansible_system | lower }}"

  pre_tasks:
    - name: Detect WSL
      ansible.builtin.command: uname -r
      register: uname_output
      changed_when: false

    - name: Set WSL flag if running on Windows Subsystem for Linux
      ansible.builtin.set_fact:
        is_wsl: "{{ 'microsoft' in uname_output.stdout | lower }}"

    - name: Set macOS flag
      ansible.builtin.set_fact:
        is_mac: "{{ ansible_system == 'Darwin' }}"

    - name: Print detected environment
      ansible.builtin.debug:
        msg: >
          "Detected OS: {{ os_type }} | WSL: {{ is_wsl }} | macOS: {{ is_mac }}"

  tasks:
    - name: Ensure common system packages are present
      ansible.builtin.package:
        name:
          - curl
          - unzip
          - tar
        state: present

    - name: Check sudo access
      ansible.builtin.command: whoami
      become: yes
      register: sudo_check
      ignore_errors: yes

    - name: Fail if no sudo privileges
      ansible.builtin.fail:
        msg: "User does not have sudo privileges — required for setup"
      when: sudo_check is failed

    - name: Ensure ~/.local/bin is in PATH (for pip-installed tools)
      ansible.builtin.lineinfile:
        path: "{{ ansible_env.HOME }}/.bashrc"
        regexp: 'export PATH=.*\.local/bin'
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        state: present
        insertafter: EOF
